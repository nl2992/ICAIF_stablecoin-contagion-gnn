# ============================================================
# stablecoin-contagion-gnn  |  experiment.yaml
# Pre-registered before any modelling — do not change thresholds
# retroactively.  Any deviation from these definitions must be
# documented and motivated in the paper.
# ============================================================

seed: 42

# ----------------------------------------------------------
# Node universe
# ----------------------------------------------------------
assets:
  fiat_backed: [USDC, USDT, TUSD, PYUSD, BUSD]
  crypto_backed: [DAI, FRAX]
  synthetic: [USDe]

venues:
  cex: [binance, coinbase, kraken]
  dex:
    curve:
      pools: [3pool, fraxusdc, usdp, susdv2]   # address resolved in fetch.py
    uniswap_v3:
      fee_tiers: ["100", "500", "3000"]         # bps

data:
  resolution: "1min"
  pre_event_baseline_days: 7    # calm window prepended to each episode
  max_forward_fill_min: 5       # gaps > 5 min → NaN, not filled
  min_coverage_pct: 80          # gate: episode must have ≥80% coverage to be used

# ----------------------------------------------------------
# Stress / contagion label thresholds  (PRE-REGISTERED)
# ----------------------------------------------------------
# Definition: node j is "stressed" at time t if:
#   fiat-backed:    |price_j(t) − 1| > 25 bps  sustained ≥ 10 consecutive minutes
#   crypto-backed:  |price_j(t) − 1| > 75 bps  sustained ≥ 10 consecutive minutes
#   synthetic:      |price_j(t) − 1| > 50 bps  sustained ≥ 10 consecutive minutes
#
# Label y_{j,t} = 1 if node j enters a NEW stressed period within
# prediction horizon Δ (inclusive) starting at time t.
# "New" = j was NOT stressed at t−1 (avoids trivial persistence label).
#
# TVL shock alternative trigger (secondary):
#   TVL drop > 10% within a 1-hour window.

labels:
  thresholds_bps:
    fiat_backed: 25
    crypto_backed: 75
    synthetic: 50
  sustained_min: 10
  tvl_shock_pct: 10.0
  label_type: onset          # "onset" = new stress entry only; "active" = any stress minute
  horizons_min: [30, 60, 240, 1440]

# ----------------------------------------------------------
# Graph construction
# ----------------------------------------------------------
graph:
  lookback_hours: 6            # rolling edge window (Uniswap paper)
  step_minutes: 60             # one snapshot per hour
  edge_corr_threshold: 0.4
  edge_methods: [correlation, flow, lead_lag]
  directed: true               # lead-lag edges are asymmetric

# ----------------------------------------------------------
# Features
# ----------------------------------------------------------
features:
  node_lags: [1, 5, 10, 30, 60]   # lag steps in minutes appended to each feature
  node:
    - price_ratio
    - rvol_1h
    - rvol_24h
    - log_vol_1h
    - amihud
    - kyle_lambda
    - ou_half_life
    - lop_wedge
    - tvl_usd_log
  edge:
    - correlation_6h
    - cross_pool_flow_usd_log
    - lead_lag_min
    - shared_lp_pct

# ----------------------------------------------------------
# Episodes — source of truth is data/episodes.yaml
# ----------------------------------------------------------
episodes_file: data/episodes.yaml

# ----------------------------------------------------------
# Train / val / test split
# ----------------------------------------------------------
split:
  strategy: chronological       # NEVER shuffle — prevents leakage
  # Test set: the most recent episode(s), ideally a different trigger type
  # than anything in train.  Exact assignment is in episodes.yaml.
  train_frac: 0.70
  val_frac: 0.15
  test_frac: 0.15               # = held-out episode(s)

# ----------------------------------------------------------
# Synthetic augmentation
# ----------------------------------------------------------
synthetic:
  n_episodes: 200
  window_hours: 72
  shock_bps_range: [10, 150]
  seed: 42
  validate: true                # run synthetic-vs-real moments check before use

# ----------------------------------------------------------
# Model ladder
# ----------------------------------------------------------
models:
  baselines: [majority, persistence]
  classical: [logreg, xgboost]
  sequential: [lstm]
  graph: [graphsage, gat]

training:
  metric: pr_auc                # PRIMARY: PR-AUC (honest under imbalance)
  secondary_metrics: [weighted_f1, roc_auc, precision, recall]
  class_weight: balanced
  epochs: 150
  patience: 15
  lr: 1.0e-3
  batch_size: 32

# ----------------------------------------------------------
# Interpretability
# ----------------------------------------------------------
interpretability:
  xgb_gain_topk: 20
  gnnexplainer_epochs: 200
  hub_centrality: betweenness
  case_study_episode: USDC_SVB   # episode used for single-prediction trace
