name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies (CPU-only torch for CI)
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install torch-geometric
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/ train/ eval/ interpret/

      - name: Type check
        run: mypy src/scgnn --ignore-missing-imports --no-strict-optional
        continue-on-error: true   # informational until stubs are complete

      - name: Test
        run: pytest tests/ -v --tb=short

      - name: Smoke test (stub data end-to-end)
        run: python scripts/smoke_test.py
